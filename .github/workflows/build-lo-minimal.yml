name: 构建最小化 LOKit（静态单文件）

on:
  workflow_dispatch:
    inputs:
      link_mode:
        description: '链接方式'
        type: choice
        default: static
        options:
          - static      # 静态链接，无 DLL 依赖，预期 40-60 MB
          - dynamic     # 动态链接，多个 .so 文件，预期 120-150 MB

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      # ---- 1. 检出本仓库 ----
      - name: 检出 rtf2html 仓库
        uses: actions/checkout@v4

      # ---- 2. 检出 LibreOffice 源码 ----
      - name: 检出 LibreOffice 源码（浅克隆）
        run: |
          git clone --depth=1 \
            https://git.libreoffice.org/core \
            $HOME/lo-src
          cd $HOME/lo-src
          git submodule update --init --depth=1 \
            dictionaries translations

      # ---- 3. 安装构建依赖（含 GCC 12）----
      - name: 安装构建依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            bison flex gperf nasm yasm \
            python3 python3-dev \
            libx11-dev libxext-dev libxrender-dev \
            libfontconfig1-dev libfreetype6-dev \
            libpng-dev libjpeg-dev libxml2-dev libxslt1-dev \
            libssl-dev zlib1g-dev libcurl4-openssl-dev \
            libglib2.0-dev libharfbuzz-dev \
            libgl1-mesa-dev libglu1-mesa-dev libnss3-dev \
            libcups2-dev libasound2-dev \
            ucpp gettext zip unzip rsync
          # LibreOffice 26.8+ 需要 GCC >= 12
          sudo apt-get install -y gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          gcc --version

      # ---- 4. 生成 autogen.input ----
      - name: 生成构建配置
        run: |
          cp build-minimal-lo/autogen.input $HOME/lo-src/autogen.input

          # 静态模式：追加 --disable-dynamic-loading
          if [ "${{ inputs.link_mode }}" = "static" ]; then
            echo "" >> $HOME/lo-src/autogen.input
            echo "# 静态链接 - 无运行时 DLL/SO 依赖" >> $HOME/lo-src/autogen.input
            echo "--disable-dynamic-loading" >> $HOME/lo-src/autogen.input
          fi

          echo "=== 最终 autogen.input ==="
          cat $HOME/lo-src/autogen.input

      # ---- 5. 配置 ----
      - name: 运行 autogen.sh
        run: |
          cd $HOME/lo-src
          ./autogen.sh

      # ---- 6. 编译 ----
      - name: 编译 LibreOffice
        run: |
          cd $HOME/lo-src
          make -j$(nproc) build-nocheck 2>&1 | tee $HOME/build.log
          echo "退出码：$?"

      # ---- 7. 打包 ----
      - name: 打包产物
        run: |
          OUTPUT=$HOME/lo-output
          mkdir -p $OUTPUT
          LO_INSTDIR=$HOME/lo-src/instdir

          if [ "${{ inputs.link_mode }}" = "static" ]; then
            # 静态模式：soffice 已内嵌所有代码，strip 去除调试符号
            if [ -f "$LO_INSTDIR/program/soffice" ]; then
              cp $LO_INSTDIR/program/soffice $OUTPUT/soffice
              strip $OUTPUT/soffice
              echo "soffice 大小：$(du -sh $OUTPUT/soffice)"
            fi

            # 复制必要的数据文件（ICU 数据、rdb 注册表等）
            mkdir -p $OUTPUT/program
            find $LO_INSTDIR/program -maxdepth 1 \
              \( -name "*.res" -o -name "*.xcu" -o -name "*.rdb" \
                 -o -name "icudt*" \) \
              -exec cp {} $OUTPUT/program/ \; 2>/dev/null || true

            # 编译 rtf2html 工具
            g++ -std=c++17 -O2 -o $OUTPUT/rtf2html \
              $GITHUB_WORKSPACE/build-minimal-lo/rtf2html-lokit.cpp -ldl
            strip $OUTPUT/rtf2html

          else
            # 动态模式：复制所有 .so 并 strip
            cp -r $LO_INSTDIR/program $OUTPUT/ 2>/dev/null || true
            strip $OUTPUT/program/*.so 2>/dev/null || true

            g++ -std=c++17 -O2 -o $OUTPUT/rtf2html \
              $GITHUB_WORKSPACE/build-minimal-lo/rtf2html-lokit.cpp -ldl
          fi

          # 复制 LOKit 头文件
          cp -r $HOME/lo-src/include/LibreOfficeKit $OUTPUT/ 2>/dev/null || true

          echo "=== 输出大小汇总 ==="
          du -sh $OUTPUT/* | sort -h

          # 打包
          cd $HOME
          TARNAME="lo-minimal-linux-x64-${{ inputs.link_mode }}.tar.gz"
          tar -czf $TARNAME -C $OUTPUT .
          echo "最终压缩包：$(du -sh $HOME/$TARNAME)"

      # ---- 8. 上传产物 ----
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: lo-minimal-linux-x64-${{ inputs.link_mode }}
          path: ~/lo-minimal-linux-x64-${{ inputs.link_mode }}.tar.gz
          retention-days: 7

      - name: 上传构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/build.log
          retention-days: 3
